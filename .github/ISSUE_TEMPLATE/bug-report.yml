name: "🐛 Bug Report"
description: "Report a broken signal file, wrong metadata, or site issue"
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: bug-type
    attributes:
      label: What kind of bug is this?
      options:
        - "Signal file doesn't work on Flipper"
        - "Wrong frequency / protocol / metadata"
        - "Download link broken"
        - "Website UI issue"
        - "Other"
    validations:
      required: true

  - type: input
    id: signal-name
    attributes:
      label: Signal name (if applicable)
      placeholder: "e.g. Generic Garage Door 433MHz"

  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      placeholder: "What's wrong? What did you expect to happen?"
    validations:
      required: true

  - type: input
    id: flipper-fw
    attributes:
      label: Flipper Zero firmware version (if relevant)
      placeholder: "e.g. 0.100.3 / Unleashed 0.72"
