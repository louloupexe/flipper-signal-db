name: Validate Signals

on:
  pull_request:
    paths:
      - 'signals.json'
      - 'signals_files.json'
      - 'signals/**'
  push:
    branches: [main]
    paths:
      - 'signals.json'
      - 'signals_files.json'
      - 'signals/**'

jobs:
  validate:
    name: Validate signal entries and manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate signals
        run: |
          npm run validate-signals
