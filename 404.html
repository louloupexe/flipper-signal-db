<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Flipper Signal DB</title>
  <style>
    :root { --bg:#0b0d12; --surface:#13161f; --border:#252d42; --accent:#f7931e; --text:#e8eaf2; --muted:#6b7694; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
    .wrap { max-width:420px; }
    .icon { font-size:4rem; margin-bottom:20px; }
    h1 { font-size:1.6rem; font-weight:800; margin-bottom:10px; }
    p { color:var(--muted); margin-bottom:28px; line-height:1.6; }
    a { display:inline-flex; align-items:center; gap:8px; padding:11px 22px; background:linear-gradient(135deg,#f7931e,#ff5f1f); color:#0b0d12; font-weight:700; border-radius:9px; text-decoration:none; transition:opacity .2s; }
    a:hover { opacity:.88; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">📡</div>
    <h1>Signal not found</h1>
    <p>The page you're looking for doesn't exist. Maybe the signal got lost in the noise.</p>
    <a href="/flipper-signal-db/">← Back to Signal DB</a>
  </div>
</body>
</html>
